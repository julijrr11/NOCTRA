<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOCTRA | Pedido de comida</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="pagina-pedido">
    <section class="contenedor-noctra">
      <h1>Reservar comida</h1>
      <p class="subtitulo-pedido">
  Elegí qué querés tener listo cuando llegues.
</p>

<img src="img/disco1.png" alt="" class="vinilo-pedido vinilo-pedido-uno">
<img src="img/disco1.png" alt="" class="vinilo-pedido vinilo-pedido-dos">
      <p id="pedido-info"></p>

      <div class="pedido-layout">
        <div>
          <h2>Menú disponible</h2>
          <div id="menu-pedido" class="menu-pedido"></div>
        </div>

        <div class="carrito-caja">
          <h2>Tu pedido</h2>
          <div id="carrito-pedido"></div>

          <label for="horario-comida">Horario de entrega</label>
          <select id="horario-comida">
            <option value="">Elegí un horario</option>
            <option value="16:30">16:30</option>
            <option value="17:00">17:00</option>
            <option value="17:30">17:30</option>
            <option value="18:00">18:00</option>
            <option value="18:30">18:30</option>
            <option value="19:00">19:00</option>
            <option value="19:30">19:30</option>
            <option value="20:00">20:00</option>
            <option value="20:30">20:30</option>
            <option value="21:00">21:00</option>
            <option value="21:30">21:30</option>
            <option value="22:00">22:00</option>
            <option value="22:30">22:30</option>
            <option value="23:00">23:00</option>
            <option value="23:30">23:30</option>
            <option value="00:00">00:00</option>
            <option value="00:30">00:30</option>
            <option value="01:00">01:00</option>
            <option value="01:30">01:30</option>
            <option value="02:00">02:00</option>
            <option value="02:30">02:30</option>
            <option value="03:00">03:00</option>
            <option value="03:30">03:30</option>
            <option value="04:00">04:00</option>
          </select>

          <label for="observaciones-comida">Observaciones</label>
          <textarea id="observaciones-comida"></textarea>

          <p id="total-pedido" class="total-pedido"></p>

          <button onclick="irAPagarComida()" class="btn btn-noctra-accion">Confirmar y pagar comida</button>
          <a href="mis-reservas.html" class="btn btn-gracias-secundario">Volver a mis reservas</a>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
