<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOCTRA | Pago de comida</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="pagina-pedido">
    <section class="contenedor-noctra">
      <h1>Confirmar pago</h1>
      <div class="resumen-pago-noctra">
  <h2>Pedido NOCTRA</h2>
  <p>Pago para confirmar tu comida antes de llegar.</p>
</div>

<img src="img/disco1.png" alt="" class="vinilo-pago">
      <p id="pago-info"></p>

      <form id="form-pago-comida" class="formulario-noctra">
        <label>Nombre en la tarjeta</label>
        <input type="text" id="titular-pago" required>

        <label>Número de tarjeta</label>
        <input type="text" id="numero-pago" maxlength="19" placeholder="0000 0000 0000 0000" required>

        <label>Vencimiento</label>
        <input type="text" id="vencimiento-pago" placeholder="MM/AA" required>

        <label>CVV</label>
        <input type="text" id="cvv-pago" maxlength="4" required>

        <button type="submit" class="btn btn-noctra-accion">Pagar y confirmar comida</button>
        <a href="pedido-comida.html" class="btn btn-gracias-secundario">Volver</a>
      </form>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
